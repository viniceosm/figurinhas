
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Decodificador Figuritas</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{margin:0;background:#111827;color:#f3f4f6;font-family:Inter,Arial,sans-serif}
.container{max-width:1050px;margin:auto;padding:24px}
.card{background:#1f2937;border:1px solid #374151;border-radius:16px;padding:18px;margin-bottom:18px;box-shadow:0 8px 24px rgba(0,0,0,.2)}
h1{margin:0}.sub{color:#9ca3af}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:#111827;border:1px solid #374151;border-radius:12px;padding:14px;text-align:center}
.stat b{font-size:28px;display:block;margin-top:6px}
button{padding:10px 16px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin-right:8px}
.primary{background:#22c55e}.secondary{background:#60a5fa}
#reader{max-width:420px}
pre{background:#111827;border:1px solid #374151;padding:12px;border-radius:10px;overflow:auto}
input{width:100%;padding:10px;background:#111827;border:1px solid #374151;color:white;border-radius:10px;margin-bottom:10px}
#lista{max-height:340px;overflow:auto;background:#111827;border:1px solid #374151;border-radius:10px;padding:10px}
.item{padding:6px 0;border-bottom:1px solid #2f3b4b}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>🧩 Decodificador Figuritas</h1>
<div class="sub">Leia um QR Code para analisar o álbum.</div>
</div>

<div class="card">
<h2>📷 Leitor QR Code</h2>
<button id="start" class="primary">Abrir câmera</button>
<label class="secondary" style="display:inline-block;padding:10px 16px;border-radius:10px;cursor:pointer">
Escolher imagem
<input id="file" type="file" accept="image/*" hidden>
</label>
<div id="reader"></div>
<p id="scanInfo" class="sub">Nenhum QR lido.</p>
</div>

<div class="grid">
<div class="stat">Coladas<b id="cColadas">0</b></div>
<div class="stat">Faltantes<b id="cFaltantes">980</b></div>
<div class="stat">Repetidas<b id="cRep">0</b></div>
<div class="stat">Total<b>980</b></div>
</div>

<div class="card">
<h2>📌 Figurinhas coladas</h2>
<input id="busca" placeholder="Pesquisar...">
<div id="lista"></div>
</div>

<div class="card">
<h2>📄 Último código lido</h2>
<pre id="codigo"></pre>
<button id="copiar" class="secondary">Copiar</button>
</div>

</div>
<script>
const TOTAL=980;
let qr;

function atualizar(coladas=[]){
 cColadas.textContent=coladas.length;
 cFaltantes.textContent=TOTAL-coladas.length;
 cRep.textContent=0;
 render(coladas);
}
function nome(i){
 if(i<=4) return "FWC Especiais "+String(i).padStart(2,"0");
 if(i<=8) return "FWC Bola e Países "+(i-4);
 if(i<=19) return "FWC História "+String(i).padStart(2,"0");
 return "Posição "+i;
}
function render(lista){
 const f=busca.value.toLowerCase();
 document.getElementById("lista").innerHTML=lista.filter(i=>nome(i).toLowerCase().includes(f)).map(i=>'<div class=item>✓ '+nome(i)+'</div>').join("");
}
busca.oninput=()=>render(window.coladas||[]);

async function decode(code){
 codigo.textContent=code;
 scanInfo.textContent="✔ QR lido às "+new Date().toLocaleTimeString();
 // TODO: integrar seu decodificador existente.
 // Exemplo temporário:
 window.coladas=[0,1,5,15];
 atualizar(window.coladas);
}

start.onclick=async()=>{
 qr=new Html5Qrcode("reader");
 await qr.start({facingMode:"environment"},{fps:10,qrbox:250},async(txt)=>{
   await decode(txt);
   await qr.stop();
 });
};

file.onchange=async(e)=>{
 if(!e.target.files.length)return;
 const r=new Html5Qrcode("reader");
 const txt=await r.scanFile(e.target.files[0],true);
 await decode(txt);
};

copiar.onclick=()=>navigator.clipboard.writeText(codigo.textContent);
</script>
</body>
</html>
