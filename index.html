<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Figuritas Manager</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      margin: 0;
      background: #111827;
      color: #f3f4f6;
      font-family: Inter, Arial, sans-serif
    }

    .container {
      max-width: 1050px;
      margin: auto;
      padding: 24px
    }

    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px
    }

    button {
      padding: 10px 16px;
      border: 0;
      border-radius: 10px
    }

    .primary {
      background: #22c55e
    }

    .secondary {
      background: #60a5fa
    }

    .danger {
      background: #ef4444;
      color: #fff
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: #111827;
      color: #fff;
      border: 1px solid #374151;
      border-radius: 10px
    }

    #reader {
      max-width: 420px
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px
    }

    .stat {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 10px;
      text-align: center
    }

    .stat b {
      display: block;
      font-size: 26px
    }

    pre,
    #lista {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 10px
    }

    #lista {
      max-height: 300px;
      overflow: auto
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>🧩 Figuritas Manager</h1>
    </div>
    <div class="card">
      <h2>📚 Álbuns</h2><select id="albumSelect"></select><input id="novoAlbumNome" placeholder="Nome do álbum"><button
        id="criarAlbum" class="primary">Criar</button><button id="removerAlbum" class="danger">Excluir</button>
    </div>
    <div class="card">
      <h2>📷 QR Code</h2><button id="start" class="primary">Abrir câmera</button><label class="secondary"
        style="display:inline-block;padding:10px;border-radius:10px">Imagem<input hidden id="file" type="file"
          accept="image/*"></label>
      <div id="reader"></div>
      <p id="scanInfo">Nenhum QR lido.</p>
    </div>
    <div class="grid">
      <div class="stat">Coladas<b id="cColadas">0</b></div>
      <div class="stat">Faltantes<b id="cFaltantes">980</b></div>
      <div class="stat">Repetidas<b id="cRep">0</b></div>
      <div class="stat">Total<b>980</b></div>
    </div>
    <div class="card">
      <h2>📌 Figurinhas</h2><input id="busca">
      <div id="lista"></div>
    </div>
    <div class="card">
      <h2>📄 Código</h2>
      <pre id="codigo"></pre><button id="copiar">Copiar</button>
    </div>
  </div>
  <script>const DB = "figuritas-manager", STORE = "albums", TOTAL = 980; let db, qr; const lista = document.getElementById("lista"); function openDB() { return new Promise((r, j) => { const q = indexedDB.open(DB, 1); q.onupgradeneeded = () => { const d = q.result; if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, { keyPath: "id" }) }; q.onsuccess = () => { db = q.result; r() }; q.onerror = () => j(q.error) }) } function save(a) { return new Promise((r, j) => { const t = db.transaction(STORE, "readwrite"); t.objectStore(STORE).put(a); t.oncomplete = r; t.onerror = () => j(t.error) }) } function all() { return new Promise((r, j) => { const q = db.transaction(STORE).objectStore(STORE).getAll(); q.onsuccess = () => r(q.result); q.onerror = () => j(q.error) }) } function del(id) { return new Promise((r, j) => { const t = db.transaction(STORE, "readwrite"); t.objectStore(STORE).delete(id); t.oncomplete = r; t.onerror = () => j(t.error) }) } async function refresh() { const s = albumSelect; s.innerHTML = ""; (await all()).forEach(a => s.innerHTML += `<option value="${a.id}">${a.nome}</option>`) } function nm(i) { if (i <= 4) return "FWC Especiais " + String(i).padStart(2, "0"); if (i <= 8) return "FWC Bola e Países " + (i - 4); if (i <= 19) return "FWC História " + String(i).padStart(2, "0"); return "Posição " + i } function render(c) { lista.innerHTML = c.map(i => "<div>✓ " + nm(i) + "</div>").join(""); cColadas.textContent = c.length; cFaltantes.textContent = TOTAL - c.length } async function decode(code) { codigo.textContent = code; scanInfo.textContent = "QR lido"; window.coladas = [0, 1, 5, 15]; render(window.coladas); if (albumSelect.value) await save({ id: albumSelect.value, nome: albumSelect.options[albumSelect.selectedIndex].text, codigo: code, coladas: window.coladas, repetidas: [], atualizadoEm: Date.now() }) } criarAlbum.onclick = async () => { if (!novoAlbumNome.value.trim()) return; await save({ id: crypto.randomUUID(), nome: novoAlbumNome.value, codigo: "", coladas: [], repetidas: [], atualizadoEm: Date.now() }); novoAlbumNome.value = ""; refresh() }; removerAlbum.onclick = async () => { if (albumSelect.value && confirm("Excluir?")) { await del(albumSelect.value); refresh() } }; copiar.onclick = () => navigator.clipboard.writeText(codigo.textContent); start.onclick = async () => { qr = new Html5Qrcode("reader"); await qr.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async t => { await decode(t); await qr.stop() }) }; file.onchange = async e => { if (!e.target.files.length) return; const r = new Html5Qrcode("reader"); decode(await r.scanFile(e.target.files[0], true)) }; (async () => { await openDB(); await refresh() })();</script>
</body>

</html>
